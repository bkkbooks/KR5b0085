靈夜明光照北海龜精故能不死入黃寧用慧明真實相無形先天妙景隱在黃庭心典章第三十一心典一體五臟王悟一惺蘇採得蟠桃山頭顯現物外知交動靜念之道德行眼迸萬珠戊己千拜六賊須歸隂陽交泰清潔善氣自明光絶利忘名恩牢跳出坦蕩無憂始明悟一坐起吾俱共棟粱大物謙下欲後必先處窪得盈能曲道金晝日耀景暮閉藏三陽照耀內景佳祥神通法象百怪潛藏通利華精調隂陽腎海精金崑山美玉盈滿中宮真人洪福經歷章第三十二經歷六合隱卯酉周天六度隂陽相合倒顛卯酉逆順庚甲兩腎之神主延壽命宫兩道上接泥丸清神爽氣晝夜真歎轉降適斗藏初九運轉參星照侵北斗一陽起火妙通九九知雄守雌可無老玄門牝户開闔明悟既達聖機真師來度知白見黑急坐守澄光顯黑神明眼碧內視通天妙觀太極肝氣章第三十王肝氣鬱勃清且長甲方寶樹枝聳根邃上接三天下侵九地羅列六腑生三光調和六腑內運三光神明霞彩永占清涼心精意專內不傾神清意泯虛無自然不空不色聖妙心傳上合三焦下玉漿貪嗔癡滅至性彰昭黃芽裊裊玉液頻澆玄液雲行去臭香洗心滌垢垢盡光生圓眀應物光耀無情治蕩髮齒鍊五方理髮萬通神開金口妙髮無衰金齒不朽取津玄膺入明堂異景堂中內隱深淵澄清照軀號曰龍泉下溉喉嚨神明通上涌靈泉胎神沭浴法體清澄自然真福坐侍華蓋遊貴京含兄咫尺通明水晶朱省玄武密護神京飄颻三帝席清涼三皇之始有道為王無爭善勝豈用刀鎗五色雲氣紛青蔥順光芝草逆氣青蔥芝香蔥臭道俗豈同閉目內盻自相望鳳眼龜睛中華根望離坎交宮德明無上使心諸神還相崇道妙虛心鍊玉烹金性通天意神鬼皆欽七玄英華開命門七珠返照內視天真龜吸霞彩走上崑崙通利天道存玄根內返陽天氣結靈鉛大丹光頭三島真仙百二十年猶可還百二長安蟾宮明微七返明元九還丹結過此守道誡獨難萬景之中心意如山頓明開悟獨立非難唯待九轉八瓊丹八仙物外常伴紅霞神丹九轉蓬島為家要復精思存七元賢達精思聖智無慮聖賢出世凡人遭遇日月之華救老殘月滿無虧日耀古壇太虛之內永結神丹肝氣周流終無端東方甲乙明朝赤帝玉户常開金關自閉肺之章第三十四眼之為氣三焦起三魂既清三毒盡滅善採黃芽真收白雪視聽幽冥候童子慧明恍惚內聽潺湲玉童來報功滿三田調理五華精髮齒太和之中玉女金童披襟散髮各顯神通三十六咽玉池裹重明九九九氣三通陽神聚會霞友雲朋開通百脈血液始性通陽脈精化為胎形神俱妙永住蓬萊顏色生光金玉澤豆初靈顯內寶盈中太極妙有至行真功齒堅髮黑不知白叩齒神通皓髮幽冥內容不老無影真形存此真神勿落落有形有盡無物常存既明真道妙慧通神當憶此宮有座席上清宮畔九夏炎炎響梟怪竹座席冰簟衆神合會轉相索千神聚會同赴天壇臨風對月自在淸間隱藏章第三十五隱藏羽蓋看天舍內隱祥輝結成華蓋羽化真人九霄之外朝拜太陽樂相呼黃庭真景蓬島相鄰嬰兒姹女跨鳳朝真明神八威正辟邪氣結神靈威儀闃靜法眼通天辟邪歸正脾神還歸是胃家土榖盈倉脾還胃糧神明九眼上顯三光耽養靈根不復枯至靜歸真保命常存神明慧朗照耀昆崙開塞命門保玉都既明門闔汞鉛相合七寶玲瓏化成寶塔萬神方昨壽有餘七寶壇上衆聖非無焚香酌酒洪禧有餘是謂脾建在中宮忘言妙理黃老中明鍊神合道永位蓬瀛五臟六腑神明主寸宅神光五行之主實腹存三真通六腑上合天門入明堂天門闡開金關鎖閉內有神尊仙聚會守雌存雄頂三光酉上金鳥卯中玉兔兩耀交光萬神光聚外方內圓神在中神明一圓妙達先天居塵不染火裹生蓮通利血脈五臟豐三耀和沖五臟神豐珠如黍米光遍虛空骨青筋赤髓如霜神淸體健骨堅髓實六賊難存三尸自出脾救七竅去不祥清志如山內汞長安大羅聖降常赴天壇日月列布設隂陽萬化生成皆稟隂陽照臨法界日月之光兩神相會化玉漿內神精光外容形影明真悟假六鍊頻整淡然無咪天人糧恬淡靈泉能濟飢渴潔𧗁凡情自然了達子丹進饌肴正黃玉體金容黃庭內看渴飮瓊漿飢餐珍饌乃曰琅膏及玉霜鍊成玉膏修就金汞龜吸夜光蛇穿七孔太上隱環八素瓊珠數金聲九九隱環至神內繫一撞三關溉益八液腎受精八渠瓊水澆溉靈芽炎收白雪可稱仙家伏於太隂見我形天如秋水夜顯圓光真無挂染性月昭彰揚風三玄出始青道玄觀天天玄明象象玄通真真無坦蕩恍惚之間至清靈微妙祥明慧視無形用之可妙恍惚通靈戲於飈臺見赤生嬰弄鳯飈汞結隂消間來赤鳳唯上青霄逸域熙真養華榮一棹神舟三島瀛洲回觀世夢吟笑無休內盼沉默鍊五形華胥異景至性觀天三陽相會二氣朝元三氣徘徊得神明三耀明真其用不勤神仙也厭世事紛紛隱龍遁芝雲琅英仙擎寶芝引虎調龍行圓出世妙隱三峯可以充飢使萬靈勤服靈芝道養嬰兒元神唯顯內禮真師上蓋玄玄下虎章祥煙成蓋至性澄觀龍蟠元海虎繞靈山沭浴章第三十六沭浴盛潔棄肥薰洗開道眼體挂銖衣水雲信任不羡輕肥入室東向誦玉篇間居宫室至德真一悟徹千經忘言了畢約得萬遍義自鮮玉訣金聲萬遍通靈功成九轉跨鶴飛升散髮無欲以長存真心坦蕩放曠林泉玉壺之內别有陽天五味皆去正氣還意遠肥甘自通道味內養元神沖和一氣夷心寂悶勿煩冤絶慮忘言自然大定住世居山內無動靜過數巳畢體神精日往月來險陽有數道顯神明全慿開悟黃華玉女告子情黃婆匹配嬰姹團圓靜清祥耀産箇胎仙真人既至使六丁力士天丁常護真靈隂魔奔散陽耀成形即授隱芝大洞經真仙之授太上之經人間闡度悟者超升十讀四拜朝太上十極誦經四方禮拜賢聖虛空衆生苦海先謁大帝後北向後有金真來朝大帝蓬島瀛洲群仙列位黃庭內經玉書暢黃庭聖降玉訣真經理明萬化妙道無形授者曰師受者盟默傳聖道玄祖盟約聖達頓明賢悟漸博雲錦鳯羅金鈕纏仙裳體挂鳳繞龍蟠金緾九九降闕淸歡以代割髮肌盧全太上古貌玉體冰肌顏如童稚皓髮眉齊携手登山歃液丹鍊成七返修就九還形神妙逹霞友登山金書玉景乃可宣聖人金訣妙逹真景雲散天青蟾光如鏡傳得可授告三官三元功畢上達三官真同聖意名列仙班勿令七祖受冥患出家退道七祖冥愆一子了道玄祖生天太上微言致神仙神通萬法大遠希夷無為德訣暗合天機下死之道此其文碧霄至聖今古常新母養赤子不死之門黃庭內景玉經注終
