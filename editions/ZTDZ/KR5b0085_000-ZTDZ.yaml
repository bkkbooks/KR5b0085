body:
  text: 神山劉長生解上淸章第一上清紫霞虛皇前九天之上異景非常上有三淸中有玉皇太上大道玉晨君超凡入聖身外之身海變桑田玉貌常新閑君蘂珠作七言蘂珠富内肘後飛金慈通顛倒物外清吟散化五形變萬神甲乙庚辛丙丁壬癸萬變神通五形聚會是爲黃庭日内篇黄庭内景聚會群仙妙通法海詩吟萬篇琴心三叠舞胎仙心琴内橅韻透青霄胎仙舞冰靈耀彰昭九氣映明出霄間九陽還轉七返通靈夜明光現鬼駭神驚神蓋童子生紫烟紫霧紅光結成華蓋神通恍惚無形不壞是田玉書可精研萬經窮盡玉訣精通白然之道聖德眞功詠之萬過昇三天無中神出萬化極機十方三界接引愚迷千災以消百病痊一念無生衆垢消隂性通杳邈占得虛無不憚虎狼之凶殘抱道忘形虎狼遠避背道著身見獸自畏亦以却老年永延外容有老有形有終内貌無形仙壽無窮上有章第二上有魂靈下關元地關緊閉天門帝開魂清氣爽結就靈胎左爲少陽右太隂左看甲龍右看瘐虎交媾徃来自然眞趣後有宻户前生門後户藏金前門隱玉無中常有妙通一六出日入月呼吸存陽降隂昇出火入水逆順顛側光要達彼元氣所合列宿分乾神相合妙用冲和天清光顯萬象森羅紫煙上下三素雲瑞雲觀步紫煙覆頂三台護我虛無聖境灌溉五華植靈根玉潤瓊茅靜收白雪五華宮内銀蟾無缺七液洞流衝廬間玄武金飯朱雀玉漿坎男离女捧與天皇廻紫抱黃入丹田紫煙光裊妙慧相迎覺花不謝氣爽神淸幽室内明照陽門要明神室内闡陽門東西相會物外乾坤口爲章弟三口爲玉池太和官口杯玉液知味熙熙咽過重樓始遇眞人漱咽靈液災不干𤩞漿頻飲九九相交迸出霞彩天地難包體生光華氣香蘭靈臺軒豁寶珠光瑩探得鉛霜汞通賢聖却滅百邪玉練顏清靜無爲心如霜雪圓耀當空十方明徹審能修之登廣寒嵔崙頂上唯占淸凉明珠一顆萬道霞光晝夜不寐乃成眞陰盡陽純無眠無夢體若虛空修成鉛汞雷鳴電激神泯泯霹靂一聲冲和交泰顯岀至神萬物之外黄庭章第四黃庭内人服錦衣中央赤子體掛六銖作伴風月為隣虛無紫華飛帬雲氣羅天書紫詔来召嬰嬌大羅朝聖速繫雲腰丹靑緑條翠靈柯藕花薌裏風擺金絲寶瓶之内别有一技七㽔玉籥閉兩扉七星官内常閉金靡寶花臺上無相容儀重扉金關宻樞機九重玄户玉鎖金關妙通萬化内結三丹玄泉幽闕髙崔嵬三峯頂上萬派飛泉仙宫寶所異景相連三田之中精氣微隱駕木牛三田耕透時兩頻潤瓊芝靈秀嬌女窈窕翳霄暉月娥抱定日裏飛鳥交光燦燦結就元初重堂煥煥明八威樓上月光重堂性燭内外俱明八仙享福天庭地關列斧釿抱一强兵外魔闘敵護法神人慧斧常劈靈䑓盤固永不衰絳宫赤子捧出神珠光生萬道晃耀空虛中池章第五中池内神服赤珠華池淸徹上有飛鳥不神而神衣掛連珠丹錦雲袍帶虎符五方異錦修成六銖巖前騎虎遣怪飛符横津三寸靈所居吸盡西江三重焰赤現出眞靈太虚無極隱芝翳鬱自相扶内採靈芝磨開寶鑑白蓮出水淸香菡萏天中章第六天中之嶽精謹脩千朶竒峯萬株松檜寶殿金門中明堲帝靈宅既清玉帝遊蒿嶽中天上通玉帝華嶽金方巨靈神異通利道路無終休巨海明珠崑崙美玉運入中華無窮仙福眉號華蓋覆明珠眉生瑞霞化成寶蓋輥出神珠内明法海九幽日月洞空無九陽宮内鳥免交光神機萬變天地難量宅中有眞常衣丹八境爲隣太虛性宅脫了雲衣丹光赫赫審能見之無疾患丹霞照耀萬病消除性如秋月體若虚無赤珠靈帬華蒨粲珠光迸出焰似飛星常餐芝草花玉成形舌下玄膺生死岸樓上仙衣功髙體掛换了凡軀為調嬰姹出淸入玄二氣煥祥耀無情金飛玉走顛倒明明形神不朽子若遇之昇天漢白然遭遇玉性彰昭便乘赤鳳雲外飄飄至道章第七至道不煩决存眞眞心不動妙慧通靈隂陽既濟物外眞形泥九百節皆有神玉骨金筋相連關節一點神光應物明徹髮神蒼華字太元生而皓首内貌無衰悟字通神妙達無為腦神精根字泥丸根固精飛神道霞彩透入泥丸字明法海眼神明上字英玄至神慧眼無上觀天一明萬化字達英玄鼻神玉壟字靈堅細鋤玉壟勤種芝田神書金字上奏三天耳神空閑字幽田自然響亮神聽潺湲既明上善應物方圓舌神通命字五倫舌湧甘津醍醐灌頂自覺神淸妙道内景齒神鍔鋒字羅千叩齒九九庚甲交鋒字傳萬古羅錦千重一面之神宗泥丸太虛之象無影眞神九陽宮闕玉户道眞泥丸九眞皆有房玄武二户朱雀七門内明開闔唯現神尊方圓一寸處此中中華神宅瑩瑩方圓下侵九地上通九天同服紫衣飛羅裳紫雲覆體號曰黄人陽純隂盡跨鶴朝眞但思一部壽無窮堲經萬卷法有三乘上乘一部悟者飛昇非各别住居腦中上下三官混合一同乾坤靈象泥丸之中列位次坐向外方三十二天中尊玉皇聖明物外光徧十方所存在心自相當中天玉帝四方天主每方八天各有寶所心神章第八心神丹元字守靈心藏於神内明微奥至象包含汞鉛顛倒肺神皓華自虚成肺藏於魄神光照耀道合三才自然明了肝神龍煙字含明肝藏於魂神明牝户字通慧眼闃然無阻翳鬱導煙主濁清离水上昇坎火下降混合清濁神通無鞅腎神玄冥字育嬰腎藏金精神調胎息字通聖妙至明太極脾神常在字魂停脾藏於志抱道無離神明樞要用坎迎离膽神龍曜字威明魂淸膽壯神定冲和既明大象誰採人魔六腑五臓神體精六腑精通五臓淸澄神丹鍊就脫殼飛昇皆在心内運天經神明天道理合聖經妙通萬化無愛無憎晝夜存之自長生周天十二内顯神通昏昏默默了達眞空肺部章第九肺部之宮似華蓋金經一部絳宫三間威儀法相淸靜修丹下有童子坐玉闕上清官畔下有玉闕大悲童子默傳金訣七元之子主調氣七竅通靈中明赤子如龜喘息海枯心死外應中嶽鼻齊位華胥中嶽上闡天門内明五帝衆聖齊尊素錦衣裳黄雲帶東西間隔慧照中央仙衣體掛帶現金光喘息呼吸體不快妙非口喘眞非鼻息赤鳳来呼鳥龜去吸急存白元和液氣白氣盈中元神寂閑玉液相傳微妙無極神仙乆視無災害至眞乆視佳趣觀天帝常清善物外無愆用之不巳形不滯神人無形與道同體萬物無拘乘風而起心部章第十心部之宮蓮含華大乘經内至明道德蓮宮蛙隱合光無極下有童子丹元家聖凡兩路天上地下至性天人幻形物化主適寒熱榮衞和性闡玄關自然顛倒三眞混合祥煙光裊丹錦飛裳披玉羅丹臺嬰姹飛錦衣多乘鸞跨鳳同上大羅金鈴朱帶坐婆娑金聲響亮玉汞全眞胎陽舞岀物外形神調血理命身不枯骨筋血肉道氣精神内眞外假借假修眞外應口舌吐五華口豈妄言舌泯五味天降神泉不飲而醉臨絶呼之亦登蘇絕廬明虛垂光朗照顯出靈童眞歡眞笑乆乆行之飛太霞絳宫非乆蓬島仙家功成歸去永伴煙霞肝部章第十一肝部之宫翠重裹甲方聖教隱在中官神光萬道翠色千重下有青童神公子九陽門下物外人同旣聞眞理立祖明宗主諸關鏡聦明始寶鑒磨開九關明徹法明慧眼氣神相結青錦披裳佩玉鈴太和宮内玉性玲瓏瓊漿金飯青錦重重和制魂魄津液平虚心清魂實腹靜魄玉潤金眞大丹光赫外應眼目日月清降日垂光性月圓明坎生二八至妙虛清百痾所鍾存無英上懸金鍾痾氣常盈廣貪難滿存濁無英同用七日自充盈七光返照慧日充盈豈分晝夜晃耀水晶垂絕念神死復生垂慈念道泯欲願神慧生於心至妙金眞攝魂還魄永無傾鍊成魂魄物外飛形氣散精竭性沉幽冥腎部章第十二腎部之官玄闕圓精通法海妙隱蟾宫天花亂墜徧滿虚空中童子冥上玄大仙玉童恍惚杳冥功成蟬蜕現出眞形主諸六府九液源陽和精固神調六府玉液旣萌中央浄土外應兩耳百液津耳聽雲雷電閃龍降逆順交通性無愚憨蒼錦雲衣舞龍幡襯步金蓮法身明大瑞氣盈盈結成華蓋上致明霞日月煙致虛極妙兩耀交光大丹九轉體遍純陽百病千災急當存無淸病除至善災滅察盡萬有太虚明徹兩部水王對生門陽道修生隂道修死三清九幽明暗奥旨使人長生升九天仙升九天鬼沉九地堲九生死悟難迷易脾部章第十三脾部之宫屬戊己黃經妙法藏在中宮理明一訣慧有萬通中有明童黃裳裹中仙羽衣赤表黃裏天圓七星地方雲履消穀散氣攝牙齒齒消百物內外濁淸大腸藏穢腎海收精是爲太倉兩明童運般黍米揔入太倉常餐金栗玉藏清涼坐在金䑓城九重金臺之上十二層樓重城二九光顯瀛洲方圓一寸命門中外方内圓鶴引胎仙命宮寶焰上接三天主調百榖五味香地産百榖天生五味萬物生成隂陽之氣辟却虚贏無病傷殢色形贏清神實腹死生兩路明明禍福外應尺宅氣色芳玄門開闡妙通神宅坎位淸魂离中靜魄光華所生以表明旣通賢聖内顯眞榮三陽照耀八表俱明黃錦玉衣帶虎章赤青黑白戊已兼黃中藏萬錦應化瓊章注念三老子輕翔佛老文冝妙智難量得一方知體變眞陽長生髙仙遠死殃超凡入聖物外無殃大羅之上朝現玉皇膽部章第十四膽部之宫六府精甲龍庚虎壬男丙女顛倒倒顛膽神明祖中有童子耀威明太虚之中物外靈童柔弱光生妙用其雄雷電八振揚玉旌巨靈眞異雄振八方玉旌唯撼接刃交光龍旗橫天擲大鈴風飐龍旗隂魔闘敵陽殺其隂眞雄無極主詣氣力攝虎兵神明慧力抱一堅貞劎揮赫赫從有強兵外應眼童鼻柱間天眼垂光虛明玉柱鍊汞成形至神遭遇腦髮相扶亦俱鮮上闡陽門妙通玉腦七竅通明毫光一道九色錦衣縁華帬體掛六銖中繋華帬便乘鸞鳳雲外朝眞佩金帯玉龍虎文玉佩玎璫威儀行步無影眞容騎龍跨虎能存威眀乘慶雲抱道忘塵眞性超群欲朝金闕穩駕祥雲役使萬神朝三元天元降相中元赦罪地元解厄萬神朝會脾長章第十五脾長一尺掩太倉五行脾祖土榖之倉中華上國一者帝王中部老君治明堂中華聖教治世修眞先天之象明者老君厥字靈元名混康忘言抱道六三混成德歸無上至大強名治人百病消榖粮靈樂能治妄念百邪竊食充飢麤布胡遮黃衣紫帶龍虎章金翁玉冠黄婆紫帶寶殿聖容萬神齊拜長精益命賴君王北海飛金南山鑿玉赤帝通明無窮聖福三呼我名神自通喝散隂魔呼聚陽神神通萬一方號金眞三老同坐各有朋三老各朋左文右武無極天中鸞迎鳳舞或精或胎别執方十方明處一點靈明胎仙養就奪得眞精桃孩合延生華芒桃臉嬰孩抱道延長深根固蒂吐岀光芒男女徊九有桃康仙男仙女世景徘徊風前月下至性希夷道父道毋對相望以天為父以地為毋太虛含象聖人妙趣師父師毋丹玄郷至聖為父至道為毋靈耀為子宻妙為度可用存思登虛空存思念道絶慮泯俗取捨俱忘自然眞福殊途一會歸要終物象窮通靜情歸一建德若偷聖功了畢閉塞三開握固停預塞金關固守眞精氣神相見得之圓成含漱金醴吞玉英會仙樓上滿泛金漿胎仙醉舞回首仙鄉遂至不飢三蟲亡玉漿金飯三嚥忘飢蟲尸旣散性顯光輝心意常和致欣昌心通意解神氣冲和内眞歡笑舞神婆娑五嶽之雲氣彭亨五嶽眞形中明玉京金光萬道紫霧千層保灌玉廬以自償天降瓊漿盈滿玉器酌了重生八仙共醉五形完堅無災殃五方霞彩鍊就眞形旣超三界去似飛星上覩章第十六上覩三光如連珠上覩三光中明本元玉花香滿結就金蓮落落明景照九隅天花飄落光徧乾坤碧虛陽耀射透崑崙五靈夜濁煥八區昇霞萬象大極爭光古今賢聖位列八方子存内皇與我遊子能見毋道合其