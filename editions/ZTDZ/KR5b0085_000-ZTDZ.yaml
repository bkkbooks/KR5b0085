靈夜明光照北海龜精故能不死入黄寧用慧明眞實相無形先天妙景隱在黄庭心典章第三十一心典一體五臓王悟一惺甦採得蟠桃山頭顯現物外知交動靜念之道德行眼迸萬珠戊己千拜六賊須歸隂陽交泰清潔善氣自明光絕利忘名恩牢跳出坦蕩無憂始明悟一坐起吾俱共棟粱大物謙下欲後必先處窪得盈能曲道金晝日耀景暮閉藏三陽照耀内景佳祥神通法象百怪潛藏通利華精調隂陽腎海精金崑山美玉盈滿中宮真人洪福經歷章第三十二經歷六合隱卯酉周天六度隂陽相合倒顛卯酉逆順庚甲兩腎之神主延壽命宫兩道上接泥丸清神爽氣晝夜眞歎轉降適斗藏初九運轉參星照侵北斗一陽起火妙通九九知雄守雌可無老玄門牝户開闔明悟既達聖機眞師來度知白見黑急坐守澄光顯黑神明眼碧内視通天妙觀太極肝氣章第三十王肝氣鬱勃清且長甲方寶樹枝聳根邃上接三天下侵九地羅列六腑生三光調和六腑内運三光神明霞彩永占清涼心精意專内不傾神清意泯虛無自然不空不色聖妙心傳上合三焦下玉漿貪嗔癡滅至性彰昭黄芽裊裊玉液頻澆玄液雲行去臭香洗心滌垢垢盡光生圓眀應物光耀無情治蕩髮齒鍊五方理髮萬通神開金口妙髮無衰金齒不朽取津玄膺入明堂異景堂中内隱深淵澄清照軀號曰龍泉下漑喉嚨神明通上涌靈泉胎神沭浴法體清澄自然真福坐侍華蓋遊貴京含兄咫尺通明水晶朱省玄武宻護神京飄颻三帝席清涼三皇之始有道為王無爭善勝豈用刀鎗五色雲氣紛青葱順光芝草逆氣青葱芝香葱臭道俗豈同閉目内盻自相望鳳眼龜睛中華根望离坎交宮德明無上使心諸神還相崇道妙虚心鍊玉烹金性通天意神鬼皆欽七玄英華開命門七珠返照内視天眞龜吸霞彩走上崑崙通利天道存玄根内返陽天氣結靈鉛大丹光頭三島真仙百二十年猶可還百二長安蟾宮明微七返明元九還丹結過此守道誡獨難萬景之中心意如山頓明開悟獨立非難唯待九轉八瓊丹八仙物外常伴紅霞神丹九轉蓬島為家要復精思存七元賢達精思聖智無慮聖賢出世凡人遭遇日月之華救老殘月滿無虧日耀古壇太虚之内永結神丹肝氣周流終無端東方甲乙明朝赤帝玉户常開金關自閉肺之章第三十四眼之爲氣三焦起三魂既清三毒盡滅善採黄芽眞收白雪視聽幽冥候童子慧明恍惚内聽潺湲玉童來報功滿三田調理五華精髮齒太和之中玉女金童披襟散髮各顯神通三十六咽玉池裹重明九九九氣三通陽神聚會霞友雲朋開通百脉血液始性通陽脉精化爲胎形神俱妙永住蓬萊顏色生光金玉澤豆初靈顯内寶盈中太極妙有至行真功齒堅髮黑不知白叩齒神通皓髮幽冥内容不老無影眞形存此眞神勿落落有形有盡無物常存既明眞道妙慧通神當憶此宮有座席上清宮畔九夏炎炎響梟怪竹座席冰簟衆神合會轉相索千神聚會同赴天壇臨風對月自在淸閑隱藏章第三十五隱藏羽蓋看天舍内隱祥輝結成華蓋羽化眞人九霄之外朝拜太陽樂相呼黃庭眞景蓬島相隣嬰兒姹女跨鳳朝眞明神八威正辟邪氣結神靈威儀闃靜法眼通天辟邪歸正脾神還歸是胃家土榖盈倉脾還胃粮神明九眼上顯三光耽養靈根不復枯至靜歸眞保命常存神明慧朗照耀崐崙開塞命門保玉都旣明門闔汞鉛相合七寶玲瓏化成寶塔萬神方昨壽有餘七寶壇上衆聖非無焚香酌酒洪禧有餘是謂脾建在中宮忘言妙理黄老中明鍊神合道永位蓬瀛五臓六腑神明主寸宅神光五行之主實腹存三眞通六腑上合天門入明堂天門闡開金關鎻閉内有神尊仙聚會守雌存雄頂三光酉上金鳥卯中玉兔兩耀交光萬神光聚外方内圓神在中神明一圓妙達先天居塵不染火裹生蓮通利血脉五臓豐三耀和冲五臓神豐珠如黍米光徧虛空骨青筋赤髓如霜神淸體徤骨堅髓實六賊難存三尸自出脾救七竅去不祥清志如山内汞長安大羅聖降常赴天壇日月列布設隂陽萬化生成皆稟隂陽照臨法界日月之光兩神相會化玉漿内神精光外容形影明眞悟假六鍊頻整淡然無咪天人糧恬淡靈泉能濟飢渴潔𧗊凡情自然了達子丹進饌肴正黄玉體金容黄庭内看渴飮瓊漿飢餐珍饌乃曰琅膏及玉霜鍊成玉膏修就金汞龜吸夜光蛇穿七孔太上隱環八素瓊珠數金聲九九隱環至神内繫一撞三關溉益八液腎受精八渠瓊水澆溉靈芽炎收白雪可稱仙家伏於太隂見我形天如秋水夜顯圓光眞無掛染性月昭彰揚風三玄岀始青道玄觀天天玄明象象玄通眞眞无坦蕩恍惚之間至清靈微妙祥明慧視無形用之可妙恍惚通靈戲於飈臺見赤生嬰弄鳯飈汞結隂消閑來赤鳳唯上青霄逸域熙眞養華榮一棹神舟三島瀛洲廻觀世夢吟笑無休内盼沉默鍊五形華胥異景至性觀天三陽相會二氣朝元三氣徘徊得神明三耀明眞其用不勤神仙也厭世事紛紛隱龍遯芝雲琅英仙擎寶芝引虎調龍行圓岀世妙隱三峯可以充飢使萬靈勤服靈芝道養嬰兒元神唯顯内禮眞師上蓋玄玄下虎章祥煙成蓋至性澄觀龍蟠元海虎繞靈山沭浴章第三十六沭浴盛潔棄肥薫洗開道眼體掛銖衣水雲信任不羡輕肥入室東向誦玉篇閑居宫室至德眞一悟徹千經忘言了畢約得萬徧義自鮮玉訣金聲萬徧通靈功成九轉跨鶴飛昇散髮無欲以長存眞心坦蕩放曠林泉玉壺之內别有陽天五味皆去正氣還意遠肥甘自通道味内養元神冲和一氣夷心寂悶勿煩冤絶慮忘言自然大定住世居山内無動靜過數巳畢體神精日徃月来險陽有數道顯神明全慿開悟黄華玉女吿子情黄婆匹配嬰姹團圓靜清祥耀産箇胎仙眞人旣至使六丁力士天丁常護眞靈隂魔奔散陽耀成形即授隱芝大洞經眞仙之授太上之經人間闡度悟者超昇十讀四拜朝太上十極誦經四方禮拜賢聖虛空衆生苦海先謁大帝後北向後有金眞来朝大帝蓬島瀛洲群仙列位黃庭内經玉書暢黄庭聖降玉訣眞經理明萬化妙道無形授者曰師受者盟黙傳聖道玄祖盟約聖達頓明賢悟漸博雲錦鳯羅金鈕纏仙裳體掛鳳遶龍蟠金緾九九降闕淸歡以代割髮肌盧全太上古貌玉體冰肌顏如童稚皓髪眉斉携手登山歃液丹鍊成七返修就九還形神妙逹霞友登山金書玉景乃可宣聖人金訣妙逹眞景雲散天青蟾光如鏡傳得可授告三官三元功畢上達三官眞同聖意名列仙班勿令七祖受冥患出家退道七祖冥愆一子了道玄祖生天太上微言致神仙神通萬法大遠希夷無爲德訣暗合天機下死之道此其文碧霄至聖今古常新母養赤子不死之門黄庭內景玉經註終
